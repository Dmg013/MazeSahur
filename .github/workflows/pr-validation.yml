name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Check PR title format
      run: |
        PR_TITLE="${{ github.event.pull_request.title }}"
        if ! echo "$PR_TITLE" | grep -Eq "^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?: .+"; then
          echo "❌ PR title must follow format: type(scope)?: description"
          echo "   Examples: feat: add maze generation, fix(player): resolve collision bug"
          exit 1
        fi
        echo "✅ PR title format is valid"

    - name: Check for merge conflicts
      run: |
        if git merge-tree $(git merge-base HEAD ${{ github.event.pull_request.base.sha }}) HEAD ${{ github.event.pull_request.base.sha }} | grep -q '<<<<<<<'; then
          echo "❌ PR has merge conflicts"
          exit 1
        fi
        echo "✅ No merge conflicts detected"

    - name: Build project
      run: ./gradlew build --no-daemon

    - name: Check code formatting
      run: ./gradlew checkstyleMain --no-daemon

    - name: Comment PR with results
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const status = '${{ job.status }}';
          const emoji = status === 'success' ? '✅' : '❌';

          const body = `## ${emoji} PR Validation Results

          **Status**: ${status}

          ### Checks performed:
          - PR title format validation
          - Merge conflict detection
          - Build verification
          - Code style checks

          ${status === 'success' ? '✅ All checks passed! Ready for review.' : '❌ Some checks failed. Please review the logs above.'}
          `;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
