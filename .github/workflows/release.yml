name: Build and Release Game

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0, v1.1.0, etc.
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew.bat dist

      - name: Create Windows native package with jpackage
        run: |
          # Create app image with bundled JRE
          jpackage `
            --input build/libs `
            --name MazeSahur `
            --main-jar MazeSahur-1.0.0.jar `
            --main-class nl.saxion.game.Main `
            --type app-image `
            --dest build/jpackage `
            --app-version 1.0.0 `
            --vendor "Olivier, Luuk, Russell, Tim" `
            --description "A first-person 3D horror maze game" `
            --java-options "-Xmx2048m"

      - name: Create Windows installer
        run: |
          jpackage `
            --input build/libs `
            --name MazeSahur `
            --main-jar MazeSahur-1.0.0.jar `
            --main-class nl.saxion.game.Main `
            --type exe `
            --dest build/installers `
            --app-version 1.0.0 `
            --vendor "Olivier, Luuk, Russell, Tim" `
            --description "A first-person 3D horror maze game" `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --java-options "-Xmx2048m"

      - name: Package portable version
        run: |
          # Create README
          @"
          MazeSahur - Horror Maze Game
          ============================

          NO JAVA REQUIRED - This is a standalone version!

          How to Run:
          - Double-click MazeSahur.exe

          Controls:
          - WASD: Move
          - Mouse: Look around
          - F: Toggle flashlight
          - ESC: Exit game

          Developed by: Olivier, Luuk, Russell, Tim
          "@ | Out-File -FilePath build/jpackage/MazeSahur/README.txt -Encoding UTF8

          # Create ZIP of portable version
          Compress-Archive -Path build/jpackage/MazeSahur -DestinationPath build/MazeSahur-Windows-Portable.zip

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: MazeSahur-Windows-Portable
          path: build/MazeSahur-Windows-Portable.zip

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: MazeSahur-Windows-Installer
          path: build/installers/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew dist

      - name: Create Linux native package with jpackage
        run: |
          # Create app image with bundled JRE
          jpackage \
            --input build/libs \
            --name MazeSahur \
            --main-jar MazeSahur-1.0.0.jar \
            --main-class nl.saxion.game.Main \
            --type app-image \
            --dest build/jpackage \
            --app-version 1.0.0 \
            --vendor "Olivier, Luuk, Russell, Tim" \
            --description "A first-person 3D horror maze game" \
            --java-options "-Xmx2048m"

          # Create README
          cat > build/jpackage/MazeSahur/README.txt << 'EOF'
          MazeSahur - Horror Maze Game
          ============================

          NO JAVA REQUIRED - This is a standalone version!

          How to Run:
          - Run: ./bin/MazeSahur

          Controls:
          - WASD: Move
          - Mouse: Look around
          - F: Toggle flashlight
          - ESC: Exit game

          Developed by: Olivier, Luuk, Russell, Tim
          EOF

          # Create tarball
          cd build/jpackage
          tar -czf ../MazeSahur-Linux-Portable.tar.gz MazeSahur/
          cd ../..

      - name: Upload Linux portable
        uses: actions/upload-artifact@v4
        with:
          name: MazeSahur-Linux-Portable
          path: build/MazeSahur-Linux-Portable.tar.gz

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            MazeSahur-Windows-Portable/*.zip
            MazeSahur-Windows-Installer/*.exe
            MazeSahur-Linux-Portable/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## MazeSahur - Horror Maze Game

            A first-person 3D horror maze game with realistic lighting and AI enemy.

            ### 🎮 Downloads:
            - **Windows (Portable)**: `MazeSahur-Windows-Portable.zip` - Extract and run MazeSahur.exe (NO JAVA REQUIRED)
            - **Windows (Installer)**: `MazeSahur-*.exe` - Run installer for automatic setup
            - **Linux (Portable)**: `MazeSahur-Linux-Portable.tar.gz` - Extract and run ./bin/MazeSahur (NO JAVA REQUIRED)

            ### ✨ Features:
            - 🎮 First-person 3D maze exploration
            - 💡 Realistic PBR lighting with dynamic shadows
            - 🔦 Flashlight with cone-based spotlight
            - 🏮 Atmospheric ceiling lamps with subtle flickering
            - 👾 Smart AI enemy with pathfinding
            - 🌫️ Horror atmosphere with fog effects
            - 🖥️ Optimized for low-end hardware

            ### 🎯 No Java Required!
            All builds include a bundled Java runtime - just download and play!

            Enjoy the game! 🎮👻
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
